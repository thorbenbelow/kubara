name: 'pr-checks'
on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - '.github/workflows/pr-checks.yaml'
      - '.scripts/**'
      - '.github/helm-profiles/**'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - '.github/workflows/pr-checks.yaml'
      - '.scripts/**'
      - '.github/helm-profiles/**'
  workflow_dispatch:

env:
  CODE_PATH: ${{ github.workspace }}/src
  REPORT_DIR: ${{ github.workspace }}/reports
  RENDER_DIR: ${{ github.workspace }}/rendered
  OUTPUT_GENERATED_DIR: ${{ github.workspace }}/output-generated
  # renovate: datasource=github-releases depName=golangci/golangci-lint
  GOLANGCI_LINT_VERSION: "v2.12.2"
  # renovate: datasource=github-releases depName=securego/gosec
  GOSEC_VERSION: "v2.27.1"
  # renovate: datasource=github-releases depName=yannh/kubeconform
  KUBECONFORM_VERSION: "v0.8.0"
  # renovate: datasource=github-releases depName=terraform-linters/tflint
  TFLINT_VERSION: "v0.63.1"
  ARTIFACT_RETENTION_DAYS: "15"

permissions:
  contents: read
  packages: read
  security-events: write
  actions: read

jobs:
  go-static-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.CODE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: src

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Verify Go environment
        run: |
          set -euo pipefail
          echo "Go version: $(go version)"
          echo "GOPATH: $(go env GOPATH)"
          echo "GOCACHE: $(go env GOCACHE)"

          # Verify and tidy dependencies
          go mod verify
          go mod tidy -v

          # Check for any changes after tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not up to date. Run 'go mod tidy' locally."
            exit 1
          fi

      - name: Create report directory
        run: mkdir -p "${{ env.REPORT_DIR }}"
      - name: Check Go code formatting (gofmt)
        run: |
          set -euo pipefail
          echo "Checking code formatting with gofmt..."
          UNFORMATTED=$(gofmt -l . || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not properly formatted:"
            echo "$UNFORMATTED" | tee "${{ env.REPORT_DIR }}/gofmt-unformatted-files.txt"
            echo "Generating diff output..."
            gofmt -d . | tee "${{ env.REPORT_DIR }}/gofmt-diff.txt"
            echo "::error::Please run 'gofmt -w .' locally to fix formatting."
            exit 1
          else
            echo "All Go files are properly formatted."
          fi

      - name: Go Vet
        run: |
          go vet ./... 2>&1 | tee "${{ env.REPORT_DIR }}/vet-results.txt"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
          working-directory: ${{ env.CODE_PATH }}
          args: |
            --output.text.path stdout \
            --output.html.path "${{ env.REPORT_DIR }}/golangci-results.html"

      - name: Cache gosec
        if: always()
        id: cache-gosec
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/bin/gosec
          key: ${{ runner.os }}-${{ runner.arch }}-gosec-${{ env.GOSEC_VERSION }}

      - name: Install gosec (if not cached)
        if: always() && steps.cache-gosec.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin
          VERSION_NO_V="${{ env.GOSEC_VERSION }}"
          VERSION_NO_V="${VERSION_NO_V#v}"
          BASE_URL="https://github.com/securego/gosec/releases/download/${{ env.GOSEC_VERSION }}"
          ARCHIVE="gosec_${VERSION_NO_V}_linux_amd64.tar.gz"
          SHA256="$(curl -fsSL "$BASE_URL/gosec_${VERSION_NO_V}_checksums.txt" | awk -v file="$ARCHIVE" '$2 == file {print $1}')"
          TMP_ARCHIVE="$(mktemp)"

          if [ -z "$SHA256" ]; then
            echo "::error::Failed to resolve checksum for $ARCHIVE"
            exit 1
          fi

          curl -fsSL "$BASE_URL/$ARCHIVE" -o "$TMP_ARCHIVE"
          echo "$SHA256  $TMP_ARCHIVE" | sha256sum -c -
          tar xzf "$TMP_ARCHIVE" -C "$HOME/.local/bin" gosec
          rm -f "$TMP_ARCHIVE"
          chmod +x "$HOME/.local/bin/gosec"

      - name: Run gosec CLI
        if: always()
        run: |
          set -euo pipefail
          GOSEC_BIN="$HOME/.local/bin/gosec"

          if [ ! -x "$GOSEC_BIN" ]; then
            echo "::error::gosec binary not found at $GOSEC_BIN"
            ls -la "$HOME/.local/bin" || true
            exit 1
          fi

          # Verify installation
          "$GOSEC_BIN" --version
          echo "Current directory: $(pwd)"

          # Find Go packages
          echo "Finding Go packages..."
          SCAN_DIRS=$(find . -name "*.go" -type f \
            -not -path "./vendor/*" \
            -not -path "./.git/*" \
            -not -path "./pkg/mod/*" \
            -not -path "./.cache/*" \
            -print0 | xargs -0 dirname | sort -u)
          echo "Found directories to scan:"
          echo "$SCAN_DIRS" | sed 's/^/  - /'

          # Run gosec with severity filtering
          echo "Running gosec..."
          if [ -n "$SCAN_DIRS" ]; then
            # Generate SARIF report (always succeeds)
            "$GOSEC_BIN" -no-fail -fmt html -out "${{ env.REPORT_DIR }}/gosec-results.html" $SCAN_DIRS

            # Run with severity threshold - only fail on HIGH severity issues
            echo "Checking for HIGH severity issues..."
            if ! "$GOSEC_BIN" -severity high -confidence medium -fmt text $SCAN_DIRS; then
              echo "❌ HIGH severity security issues found!"
              exit 1
            else
              echo "✅ No HIGH severity security issues found"
            fi
          else
            echo "❌ No Go packages found!"
            exit 1
          fi

      - name: Upload static analysis results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: go-static-analysis-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_DIR }}

  go-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.CODE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: src

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Create report directory
        run: mkdir -p "${{ env.REPORT_DIR }}"
      - name: Run Go Unit Tests
        run: |
          set -euo pipefail
          echo "Running unit tests..."
          go test \
            -race \
            -timeout=10m \
            -coverprofile="${{ env.REPORT_DIR }}/coverage.out" \
            -covermode=atomic \
            -json \
            ./... > "${{ env.REPORT_DIR }}/go-test-results.json"

          # Generate Coverage report
          echo "Test coverage summary:"
          go tool cover -func="${{ env.REPORT_DIR }}/coverage.out" | tail -1
          go tool cover -html="${{ env.REPORT_DIR }}/coverage.out" -o "${{ env.REPORT_DIR }}/coverage.html"

          # Extract coverage percentage
          COVERAGE=$(go tool cover -func="${{ env.REPORT_DIR }}/coverage.out" | tail -1 | awk '{print $3}')
          echo "Test coverage: $COVERAGE"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: go-test-results-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_DIR }}

  run-kubara-init-and-generate:
    needs: [go-static-analysis, go-unit-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    outputs:
      success: ${{ steps.commit.outputs.success }}
    env:
      # .env updates (must match src/internal/envconfig/env)
      KUBARA_PROJECT_NAME: "kubara"
      KUBARA_PROJECT_STAGE: "tst"
      KUBARA_DOCKERCONFIG_BASE64: "000000"
      KUBARA_ARGOCD_WIZARD_ACCOUNT_PASSWORD: "000000"
      KUBARA_ARGOCD_HELM_REPO_USERNAME: "git"
      KUBARA_ARGOCD_HELM_REPO_PASSWORD: "000000"
      KUBARA_ARGOCD_HELM_REPO_URL: "https://kubara.io/kubara.git"
      KUBARA_ARGOCD_GIT_HTTPS_URL: "https://kubara.io/kubara.git"
      KUBARA_ARGOCD_GIT_PAT_OR_PASSWORD: "000000"
      KUBARA_ARGOCD_GIT_USERNAME: "git"

      # config.yaml updates
      KUBARA_DNS_NAME: "kubara-tst.stackit.run"
      KUBARA_STACKIT_PROJECT_ID: "00000000-0000-0000-0000-000000000000"
      KUBARA_TERRAFORM_PROVIDER: "stackit"
      KUBARA_CLUSTER_TYPE: "hub"
      KUBARA_SSO_ORG: "Kubara"
      KUBARA_SSO_TEAM: "Test"
      KUBARA_KUBERNETES_TYPE: "ske"
      KUBARA_KUBERNETES_VERSION: "1.35.0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Create output directory
        run: |
          echo "output dir: ${{ env.OUTPUT_GENERATED_DIR }}"
          mkdir -p "${{ env.OUTPUT_GENERATED_DIR }}"

      - name: kubara init --prep
        run: |
          set -euo pipefail
          cd src
          go run main.go --work-dir "${{ env.OUTPUT_GENERATED_DIR }}" init --prep

      - name: Update .env (strict template mode)
        run: |
          set -euo pipefail
          .scripts/kubara-env-update.sh "${{ env.OUTPUT_GENERATED_DIR }}/.env"

      - name: kubara init
        run: |
          set -euo pipefail
          cd src
          go run main.go --work-dir "${{ env.OUTPUT_GENERATED_DIR }}" init

      - name: Update config.yaml (strict mode)
        run: |
          set -euo pipefail
          .scripts/kubara-config-update.sh "${{ env.OUTPUT_GENERATED_DIR }}/config.yaml"

      - name: Generate kubara artifacts
        run: |
          cd src
          go run main.go --work-dir "${{ env.OUTPUT_GENERATED_DIR }}" generate

      - name: Upload generated helm and terraform files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kubara-generated-files-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.OUTPUT_GENERATED_DIR }}

  helm-checks:
    needs: run-kubara-init-and-generate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout CI overlay profiles
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/helm-profiles
            .scripts

      - name: Download generated kubara artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kubara-generated-files-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}

      - name: Verify preinstalled Helm
        run: |
          set -euo pipefail
          helm version --short

      - name: Cache kubeconform
        id: cache-kubeconform
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/bin/kubeconform
          key: tools-kubeconform-${{ env.KUBECONFORM_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install kubeconform (if missing)
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin

          if ! [ -x "$HOME/.local/bin/kubeconform" ]; then
            KUBECONFORM_ARCHIVE="kubeconform-linux-amd64.tar.gz"
            KUBECONFORM_BASE_URL="https://github.com/yannh/kubeconform/releases/download/${{ env.KUBECONFORM_VERSION }}"
            KUBECONFORM_SHA256="$(curl -fsSL "$KUBECONFORM_BASE_URL/CHECKSUMS" | awk '/  kubeconform-linux-amd64.tar.gz$/ {print $1}')"
            TMP_ARCHIVE="$(mktemp)"

            curl -fsSL "$KUBECONFORM_BASE_URL/$KUBECONFORM_ARCHIVE" -o "$TMP_ARCHIVE"
            echo "$KUBECONFORM_SHA256  $TMP_ARCHIVE" | sha256sum -c -
            tar xzf "$TMP_ARCHIVE" -C "$HOME/.local/bin" kubeconform
            rm -f "$TMP_ARCHIVE"
            chmod +x "$HOME/.local/bin/kubeconform"
          fi

          kubeconform -v

      - name: Lint, render and validate Helm charts
        run: .scripts/helm-checks.sh

      - name: Upload Helm validation results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: helm-validation-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: |
            ${{ env.REPORT_DIR }}/helm/
            ${{ env.RENDER_DIR }}/

  terraform-checks:
    needs: run-kubara-init-and-generate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .scripts

      - name: Download generated kubara artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kubara-generated-files-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.9.3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Validate Terraform modules and environments
        run: .scripts/terraform-checks.sh

      - name: Upload Terraform validation results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: terraform-validation-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_DIR }}/terraform
