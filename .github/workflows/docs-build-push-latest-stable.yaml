name: build/publish docs latest-stable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./docs
    steps:
      - name: Create GitHub App token for docs publish
        id: docs-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.DOCS_PUBLISHER_GITHUB_APP_ID }}
          private-key: ${{ secrets.DOCS_PUBLISHER_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout kubara repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.docs-app-token.outputs.token }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install and setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: '0.11.23'
          enable-cache: true
          cache-dependency-glob: 'docs/uv.lock'

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate docs build (strict)
        run: uv run mkdocs build --strict

      - name: Configure git for mike deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and publish tagged release to gh-pages
        run: |
          VERSION="${GITHUB_REF_NAME}"
          uv run mike deploy \
            --update-aliases \
            --push \
            --branch gh-pages \
            "$VERSION" latest-stable

          # Keep root docs landing page on the stable alias.
          uv run mike set-default \
            --push \
            --branch gh-pages \
            latest-stable
