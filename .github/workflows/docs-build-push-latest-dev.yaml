name: build/publish docs latest-dev

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./docs
    steps:
      - name: Create GitHub App token for docs publish
        id: docs-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.DOCS_PUBLISHER_GITHUB_APP_ID }}
          private-key: ${{ secrets.DOCS_PUBLISHER_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout kubara repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.docs-app-token.outputs.token }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install and setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: '0.11.25'
          enable-cache: true
          cache-dependency-glob: 'docs/uv.lock'

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate docs build (strict)
        run: uv run mkdocs build --strict

      - name: Configure git for mike deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and publish latest-dev to gh-pages
        run: |
          uv run mike deploy \
            --update-aliases \
            --push \
            --branch gh-pages \
            next latest-dev

      - name: Refresh site-root llms.txt
        run: |
          git fetch origin gh-pages
          GHP="${RUNNER_TEMP}/gh-pages"
          git worktree add --detach "$GHP" origin/gh-pages
          # Keep the index pointed at the stable version; this run only refreshes
          # the version list. Skip gracefully if no stable release exists yet.
          uv run python scripts/build_root_llms.py "$GHP" --allow-missing-default
          if [ -f "$GHP/llms.txt" ]; then
            git -C "$GHP" add llms.txt
            if git -C "$GHP" diff --cached --quiet; then
              echo "site-root llms.txt unchanged"
            else
              git -C "$GHP" commit -m "docs: regenerate site-root llms.txt"
              git -C "$GHP" push origin HEAD:gh-pages
            fi
          else
            echo "no site-root llms.txt generated; skipping"
          fi
          git worktree remove --force "$GHP"
