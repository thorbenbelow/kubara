name: build/publish docs latest-dev

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./docs
    steps:
      - name: Create GitHub App token for docs publish
        id: docs-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DOCS_PUBLISHER_GITHUB_APP_ID }}
          private-key: ${{ secrets.DOCS_PUBLISHER_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout kubara repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.docs-app-token.outputs.token }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install and setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: '0.11.16'
          enable-cache: true
          cache-dependency-glob: 'docs/uv.lock'

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate docs build (strict)
        run: uv run mkdocs build --strict

      - name: Configure git for mike deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and publish latest-dev to gh-pages
        run: |
          uv run mike deploy \
            --update-aliases \
            --push \
            --branch gh-pages \
            next latest-dev
